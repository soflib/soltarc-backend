// proto/payments.proto
syntax = "proto3";
package payments;

service PaymentsService {
    // Plans
    rpc GetPlan         (GetPlanRequest)              returns (PlanResponse);
    rpc ListPlans       (ListPlansRequest)             returns (ListPlansResponse);

    // Subscriptions
    rpc CreateSubscription  (CreateSubscriptionRequest) returns (SubscriptionResponse);
    rpc GetSubscription     (GetSubscriptionRequest)    returns (SubscriptionResponse);
    rpc UpdateSubscription  (UpdateSubscriptionRequest) returns (SubscriptionResponse);
    rpc CancelSubscription  (CancelSubscriptionRequest) returns (CancelSubscriptionResponse);

    // Payment methods
    rpc AddPaymentMethod    (AddPaymentMethodRequest)    returns (PaymentMethodResponse);
    rpc GetPaymentMethod    (GetPaymentMethodRequest)    returns (PaymentMethodResponse);
    rpc ListPaymentMethods  (ListPaymentMethodsRequest)  returns (ListPaymentMethodsResponse);
    rpc DeletePaymentMethod (DeletePaymentMethodRequest) returns (DeletePaymentMethodResponse);
    rpc SetDefaultMethod    (SetDefaultMethodRequest)    returns (PaymentMethodResponse);

    // Invoices
    rpc GetInvoice   (GetInvoiceRequest)   returns (InvoiceResponse);
    rpc ListInvoices (ListInvoicesRequest) returns (ListInvoicesResponse);
}

// ── Plans ─────────────────────────────────────────────────────────────────

message GetPlanRequest {
    string plan_id = 1;
}

message ListPlansRequest {}

message PlanResponse {
    string plan_id    = 1;
    string name       = 2;
    int32  max_admins = 3;
    int32  max_users  = 4;
    string price      = 5;
    string currency   = 6;
}

message ListPlansResponse {
    repeated PlanResponse plans = 1;
}

// ── Subscriptions ─────────────────────────────────────────────────────────

message CreateSubscriptionRequest {
    string tenant_id       = 1;
    string plan_id         = 2;
    string provider        = 3;
    string provider_sub_id = 4;
}

message GetSubscriptionRequest {
    string tenant_id = 1;
}

message UpdateSubscriptionRequest {
    string tenant_id = 1;
    string plan_id   = 2;
    string status    = 3;
}

message CancelSubscriptionRequest {
    string tenant_id = 1;
}

message SubscriptionResponse {
    string          subscription_id = 1;
    string          tenant_id       = 2;
    string          plan_id         = 3;
    string          status          = 4;
    int32           max_admins      = 5;
    int32           max_users       = 6;
    string          provider        = 7;
    optional string provider_sub_id = 8;  // Option<String>
    string          starts_at       = 9;
    optional string ends_at         = 10; // Option<DateTime<Utc>>
}

message CancelSubscriptionResponse {
    bool success = 1;
}

// ── Payment methods ───────────────────────────────────────────────────────

// Matches PaymentMethodType enum
enum PaymentMethodType {
    PAYMENT_METHOD_TYPE_UNSPECIFIED = 0;
    CREDIT_CARD                     = 1;
    DEBIT_CARD                      = 2;
    BANK_TRANSFER                   = 3;
    WALLET                          = 4;
}

// Matches PaymentProvider enum
enum PaymentProvider {
    PAYMENT_PROVIDER_UNSPECIFIED = 0;
    STRIPE                       = 1;
    PAYPAL                       = 2;
    MERCADOPAGO                  = 3;
    MANUAL                       = 4;
}

message AddPaymentMethodRequest {
    string            tenant_id      = 1;
    PaymentMethodType type           = 2;  // ← enum, matches r#type: PaymentMethodType
    PaymentProvider   provider       = 3;  // ← enum, matches provider: PaymentProvider
    string            provider_token = 4;  // ← matches provider_token: String
    optional string   last_four      = 5;  // ← matches last_four: Option<String>
    bool              is_default     = 6;  // ← matches is_default: bool
    optional string   expires_at     = 7;  // ← matches expires_at: Option<DateTime<Utc>>
}

message GetPaymentMethodRequest {
    string payment_method_id = 1;
}

message ListPaymentMethodsRequest {
    string tenant_id = 1;
}

message DeletePaymentMethodRequest {
    string payment_method_id = 1;
}

message SetDefaultMethodRequest {
    string tenant_id         = 1;
    string payment_method_id = 2;
}

// Matches PaymentMethod struct
message PaymentMethodResponse {
    string            payment_method_id = 1;  // ← id: Uuid
    string            tenant_id         = 2;  // ← tenant_id: Uuid
    PaymentMethodType type              = 3;  // ← r#type: PaymentMethodType
    PaymentProvider   provider          = 4;  // ← provider: PaymentProvider
    optional string   last_four         = 5;  // ← last_four: Option<String>
    bool              is_default        = 6;  // ← is_default: bool
    optional string   expires_at        = 7;  // ← expires_at: Option<DateTime<Utc>>
    string            created_at        = 8;  // ← created_at: DateTime<Utc>
}

message ListPaymentMethodsResponse {
    repeated PaymentMethodResponse methods = 1;
}

message DeletePaymentMethodResponse {
    bool success = 1;
}

// ── Invoices ──────────────────────────────────────────────────────────────

message GetInvoiceRequest {
    string invoice_id = 1;
}

message ListInvoicesRequest {
    string tenant_id = 1;
    int32  limit     = 2;
    int32  offset    = 3;
}

message InvoiceResponse {
    string          invoice_id      = 1;
    string          tenant_id       = 2;
    string          subscription_id = 3;
    string          amount          = 4;
    string          currency        = 5;
    string          status          = 6;
    string          provider        = 7;
    optional string provider_inv_id = 8;  // Option<String>
    optional string paid_at         = 9;  // Option<DateTime<Utc>>
    string          period_start    = 10;
    string          period_end      = 11;
    string          created_at      = 12;
}

message ListInvoicesResponse {
    repeated InvoiceResponse invoices = 1;
    int32                    total    = 2;
}